<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Delivery Check-In</title>
    <link rel="stylesheet" href="/static/styles.css?v=1.20">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="app-header">
            <div class="header-left">
                <button id="back-btn" class="icon-btn hidden" onclick="goBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
                <h1 id="page-title">Deliveries</h1>
            </div>
            <div class="header-right">
                <span id="status-badge" class="badge"></span>
                <button id="refresh-btn" class="icon-btn" onclick="refreshData()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- View: Delivery List -->
        <div id="view-deliveries" class="view active">
            <div class="action-bar">
                <button class="btn btn-primary btn-lg" onclick="showStorageFiles()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14,2 14,8 20,8"/>
                    </svg>
                    Import from Storage
                </button>
                <button class="btn btn-outline btn-lg" onclick="showReports()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 17H7v-7h2m4 7h-2V7h2m4 10h-2v-4h2"/>
                        <rect x="2" y="2" width="20" height="20" rx="2"/>
                    </svg>
                    Reports
                </button>
            </div>
            <div id="delivery-list" class="card-list">
                <div class="empty-state">
                    <p>No deliveries yet</p>
                    <p class="subtitle">Import a worksheet from Firebase Storage to get started</p>
                </div>
            </div>
        </div>

        <!-- View: Reports -->
        <div id="view-reports" class="view">
            <div id="report-list" class="card-list">
                <div class="loading">Loading reports...</div>
            </div>
        </div>

        <!-- View: Storage Files -->
        <div id="view-storage" class="view">
            <div id="storage-list" class="card-list">
                <div class="loading">Loading files...</div>
            </div>
        </div>

        <!-- View: Delivery Detail (Item/Supplier toggle) -->
        <div id="view-detail" class="view">
            <div id="delivery-summary" class="summary-bar"></div>
            <div id="detail-title" class="detail-title" onclick="goBack()">
                <svg class="detail-back-arrow" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                <span id="detail-title-text"></span>
            </div>
            <div class="toggle-bar">
                <button id="tab-items" class="toggle-btn active" onclick="switchTab('items')">Items</button>
                <button id="tab-suppliers" class="toggle-btn" onclick="switchTab('suppliers')">Suppliers</button>
            </div>
            <!-- Item tab: flat list of all items -->
            <div id="tab-content-items">
                <div class="sort-bar">
                    <span class="sort-label">Sort:</span>
                    <button id="sort-alpha" class="sort-btn active" onclick="setItemSort('alpha')">A-Z</button>
                    <button id="sort-qty" class="sort-btn" onclick="setItemSort('qty')">Cases</button>
                    <button id="sort-supplier" class="sort-btn" onclick="setItemSort('supplier')">Supplier</button>
                    <div class="sort-search-wrapper">
                        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                        </svg>
                        <input type="text" id="item-search" placeholder="Search..." oninput="onSearchInput()" autocomplete="off" autocorrect="off" spellcheck="false">
                        <button id="search-clear-btn" class="search-clear hidden" onclick="clearSearch()">&times;</button>
                    </div>
                    <span id="item-receive-all-btn" class="receive-all-slot"></span>
                </div>
                <div id="flat-item-list" class="compact-list"></div>
            </div>
            <!-- Supplier tab: supplier cards -->
            <div id="tab-content-suppliers" class="hidden">
                <div class="sort-bar">
                    <span class="sort-label">Sort:</span>
                    <button id="supplier-list-sort-alpha" class="sort-btn active" onclick="setSupplierListSort('alpha')">A-Z</button>
                    <button id="supplier-list-sort-qty" class="sort-btn" onclick="setSupplierListSort('qty')">Cases</button>
                </div>
                <div id="supplier-list" class="card-list"></div>
            </div>
        </div>

        <!-- View: Supplier Items drill-in (from Supplier tab) -->
        <div id="view-checkin" class="view">
            <div id="supplier-summary" class="summary-bar"></div>
            <div id="supplier-title" class="detail-title" onclick="goBack()">
                <svg class="detail-back-arrow" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                <span id="supplier-header-name"></span>
            </div>
            <div class="sort-bar">
                <span class="sort-label">Sort:</span>
                <button id="supplier-sort-alpha" class="sort-btn active" onclick="setSupplierItemSort('alpha')">A-Z</button>
                <button id="supplier-sort-qty" class="sort-btn" onclick="setSupplierItemSort('qty')">Cases</button>
                <span id="supplier-receive-all-btn" class="receive-all-slot"></span>
            </div>
            <div id="item-list" class="compact-list"></div>
        </div>

        <!-- Modal: Check-in Item -->
        <div id="checkin-modal" class="modal hidden">
            <div class="modal-backdrop" onclick="closeModal()"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-item-name">Item</h2>
                    <button class="icon-btn" onclick="closeModal()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Expected Quantity</label>
                        <div id="modal-expected" class="info-value"></div>
                    </div>
                    <div class="form-group">
                        <label>Quantity Received</label>
                        <div class="qty-input-row">
                            <button class="qty-btn" onclick="adjustQty(-1)">-</button>
                            <input type="number" id="modal-qty" min="0" inputmode="numeric">
                            <button class="qty-btn" onclick="adjustQty(1)">+</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="status-grid status-grid-3">
                            <button id="status-short" class="status-btn" data-status="short" onclick="selectReason('short')">Short</button>
                            <button id="status-over" class="status-btn" data-status="over" onclick="selectReason('over')">Over</button>
                            <button id="status-return" class="status-btn" data-status="return" onclick="selectReason('return')">Return</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Notes (optional)</label>
                        <textarea id="modal-notes" rows="2" placeholder="Any issues..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button id="modal-ok-btn" class="btn btn-ok-neutral" onclick="submitCheckIn()">OK</button>
                </div>
            </div>
        </div>

        <!-- Modal: Delivery Complete -->
        <div id="complete-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-content complete-modal-content">
                <div class="modal-header">
                    <h2>All items received!</h2>
                </div>
                <div class="modal-body">
                    <p class="complete-subtitle">See exceptions below. Continue to confirm delivery over?</p>
                    <div id="exception-list" class="exception-list"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="dismissCompletionModal()">Continue Checking In</button>
                    <button class="btn btn-success" onclick="confirmDeliveryComplete()">Confirm Delivery Complete</button>
                </div>
            </div>
        </div>

        <!-- View: Delivery Complete (post-confirmation) -->
        <div id="view-complete" class="view">
            <div class="complete-screen">
                <div class="complete-checkmark">&#10003;</div>
                <h1 class="complete-heading">Delivery Over</h1>
                <p id="complete-date" class="complete-date"></p>
                <button class="btn btn-primary btn-lg" onclick="loadNewDelivery()">Load New Delivery</button>
            </div>
        </div>

        <!-- Fireworks Canvas (overlay) -->
        <canvas id="fireworks-canvas"></canvas>

        <!-- Toast notifications -->
        <div id="toast-container"></div>

        <!-- Version -->
        <div id="app-version">v1.20</div>
    </div>

    <script src="/static/app.js?v=1.20"></script>
</body>
</html>
